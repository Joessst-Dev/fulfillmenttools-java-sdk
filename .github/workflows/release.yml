name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create the GitHub Release
  packages: write  # needed to publish to GitHub Packages

jobs:
  release:
    name: Build, Sign & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set release version from tag
        # Strips the leading 'v' so tag v1.2.3 becomes version 1.2.3 in the build.
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build & test
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: ./gradlew test --no-daemon

      - name: Publish to GitHub Packages
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --no-daemon

      - name: Publish to Maven Central
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_TOKEN: ${{ secrets.SONATYPE_TOKEN }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAllPublicationsToCentralPortal --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sdk-core/build/libs/*.jar
            sdk-spring-boot-starter/build/libs/*.jar
