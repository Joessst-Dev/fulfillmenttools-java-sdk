name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create the GitHub Release
  packages: write  # needed to publish to GitHub Packages

jobs:
  release:
    name: Build, Sign & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set release version from tag
        # Strips the leading 'v' so tag v1.2.3 becomes version 1.2.3 in the build.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" build.gradle.kts

      - name: Build & test
        run: ./gradlew test --no-daemon

      - name: Publish to GitHub Packages and Maven Central
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_TOKEN: ${{ secrets.SONATYPE_TOKEN }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publish --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sdk-core/build/libs/*.jar
            sdk-spring-boot-starter/build/libs/*.jar
